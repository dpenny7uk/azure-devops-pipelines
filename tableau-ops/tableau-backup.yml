# Tableau Server Backup Pipeline
# Runs daily backup with retention cleanup and email notification
# Supports staging and production environments via variable groups

trigger: none

schedules:
  - cron: '0 2 * * *'          # 02:00 UTC daily
    displayName: 'Daily Tableau Backup'
    branches:
      include:
        - main
    always: true

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'production'
    values:
      - staging
      - production
  - name: whatIf
    displayName: 'WhatIf Mode (preview only)'
    type: boolean
    default: false

variables:
  - group: 'tableau-${{ parameters.environment }}'     # Contains server names, paths, credentials
  - group: 'email-config'                               # SMTP settings

pool:
  name: 'Self-Hosted Windows'
  demands:
    - Agent.ComputerName -equals $(TableauPrimaryServer)

stages:
  - stage: Backup
    displayName: 'Tableau Backup - ${{ parameters.environment }}'
    jobs:
      - job: RunBackup
        displayName: 'Execute Backup'
        timeoutInMinutes: 180
        steps:
          - checkout: self
            clean: true

          - task: PowerShell@2
            displayName: 'Run Tableau Backup'
            inputs:
              filePath: '$(Build.SourcesDirectory)/scripts/Invoke-TableauBackup.ps1'
              arguments: >-
                -ServerName "$(TableauPrimaryServer)"
                -BackupPath "$(BackupPath)"
                -TableauBackupPath "$(TableauBackupPath)"
                -LogPath "$(LogPath)"
                -RetentionDays $(RetentionDays)
                -EmailTo "$(EmailTo)"
                -EmailFrom "$(EmailFrom)"
                -SmtpServer "$(SmtpServer)"
                ${{ if eq(parameters.whatIf, true) }}:
                  -WhatIf
              errorActionPreference: 'stop'
            env:
              TableauPrimaryServer: $(TableauPrimaryServer)
              TableauSecondaryServer: $(TableauSecondaryServer)
              Environment: ${{ parameters.environment }}

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Logs'
            condition: always()
            inputs:
              targetPath: '$(LogPath)'
              artifact: 'backup-logs-$(Build.BuildId)'
